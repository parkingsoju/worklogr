name: Azure Static Web Apps CI/CD

# Deploys via the Static Web Apps CLI instead of Azure/static-web-apps-deploy@v1.
# The Docker-based action pulls mcr.microsoft.com/appsvc/staticappsclient:stable
# at runtime; when MCR returns 401 (recurring registry incident) every deploy
# fails before our app even builds. The CLI builds with plain Node and uploads
# through the deployment token, so it never touches that image.

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build
        working-directory: web
        env:
          VITE_API_URL: https://worklogr-api-hxdhdmc2dhcfeyam.southeastasia-01.azurewebsites.net
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        run: >
          npx -y @azure/static-web-apps-cli@latest deploy ./web/dist
          --deployment-token "$SWA_TOKEN"
          --env production
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_POND_07852F000 }}
